format_version: '23'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: react-native

app:
  envs:
  - EXPO_PUBLIC_SUPABASE_URL: https://wttiojmndzmsxygzbtvg.supabase.co
    opts:
      is_expand: false
  - EXPO_PUBLIC_SUPABASE_ANON_KEY: sb_publishable_BMbLSXn9ADQs4bHAHI9QYw_9-0DwSEB
    opts:
      is_expand: false

workflows:
  # ============================================================
  # Primary workflow - QA only (runs on PRs)
  # ============================================================
  primary:
    description: |
      QA checks only - no builds. Triggered on all PRs.
    steps:
    - git-clone@8: {}
    - restore-npm-cache@2: {}
    - npm@2:
        title: npm ci
        inputs:
        - command: ci
    - npm@2:
        title: Type check
        inputs:
        - command: run
        - name: type-check
    - npm@2:
        title: Lint
        inputs:
        - command: run
        - name: lint
    - npm@2:
        title: Tests
        inputs:
        - command: run
        - name: test:ci
    - save-npm-cache@1: {}
    - deploy-to-bitrise-io@2: {}

  # ============================================================
  # Dev builds (triggered on push to develop)
  # ============================================================
  dev_android:
    description: |
      Development build - Android debug APK (expo-dev-client)
    steps:
    - git-clone@8: {}
    - restore-npm-cache@2: {}
    - npm@2:
        title: npm ci
        inputs:
        - command: ci
    - npm@2:
        title: Type check
        inputs:
        - command: run
        - name: type-check
    - npm@2:
        title: Lint
        inputs:
        - command: run
        - name: lint
    - npm@2:
        title: Tests
        inputs:
        - command: run
        - name: test:ci
    - save-npm-cache@1: {}
    - run-eas-build@0:
        title: EAS Build Android (dev)
        inputs:
        - platform: android
        - eas_options: --profile dev
        - access_token: $EXPO_TOKEN
    - deploy-to-bitrise-io@2: {}

  dev_ios:
